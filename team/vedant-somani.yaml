  bio: Vedant Somani is a Text Mining Student Specialist at the eScience Institute and a Master’s student in Information Management at the University of Washington. His work focuses on applying data science and machine learning to extract insights from complex textual data, with an emphasis on building practical, scalable solutions. He brings a strong foundation in software engineering and has experience developing end-to-end systems, from data collection and processing to analysis and deployment. He is also interested in agentic AI systems and how intelligent workflows can automate and enhance research tasks.

