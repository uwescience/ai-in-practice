about:
  description: Join us for a week of hands-on training in 
    AI methods for research, facilitated project work, and self-directed 
    learning. Our workshop is designed for researchers looking to move 
    beyond textbook examples and tackle the challenges of real-world 
    applications. Tutorials early in the week provide foundational skills 
    that participants will apply during self-directed project work, 
    supported by instructors and peers. Our goal is for every participant 
    to develop fluency with AI research tools to accelerate discovery 
    while adhering to best practices for reproducible workflows.
  overview: >-
    We welcome participants from any department at the University of 
    Washington, including the humanities, physical and life sciences, social 
    sciences, engineering, and beyond. We expect participants to have some 
    programming experience (Python, R, or similar). Tutorials will be in 
    Python, but any language can be used for project work. We also expect 
    some familiarity with basic machine learning concepts. This workshop 
    focuses on how to apply AI in research, so it is suitable for PhD 
    students, postdocs, research faculty and staff, and Master's or 
    undergraduate students who are already involved in research. 
  learn_more: https://escience.washington.edu/using-data-science/hackweeks
  links:
    - url: '#'
      title: A sample link
      new_window: True
projects:
  description: >-
    Participants will be invited to develop their own ideas for project work, 
    ideally building on an existing research project, exploring a new 
    direction, or working directly with concepts from Day 1 to solidify 
    learning. Throughout the week, participants will apply what they learn 
    to their projects, with instructors and assistants available for 
    guidance. We encourage participants working on similar problems to 
    collaborate and learn from each other. On the final 
    day, participants will share their progress and define a concrete plan 
    for continuing the work after the workshop. 
  learn_more: 'projects/index.html'
tutorials:
  description: >-
    Workshop tutorials will provide a broad overview of modern AI tools for 
    research. Day 1 is an intensive day focused on the  
    fundamentals of AI for research. We will learn how neural networks are 
    trained and evaluated, how vision and sequence models work, and how 
    transfer learning lets researchers build on pretrained models rather than 
    starting from scratch. Later tutorials illustrate best practices for 
    applying these tools across a full AI research lifecycle. We will learn 
    about foundation models, the Hugging Face transformers library, and the 
    practicalities of scaling training and deployment. Dedicated sessions also 
    address how to interpret AI results rigorously and make AI-based research 
    reproducible.

  learn_more: 'tutorials/index.html'
applicant_info: AI Summer Workshop will take place July 27-31 on the University
  of Washington Campus. Applications have not yet opened, 
  but should be anticipated in May 2026.
