about:
  description: Join us for a week of hands-on training in 
    AI methods for research, facilitated project work, and self-directed 
    learning. The AI in Practice Summer Institute is designed for researchers looking to move 
    beyond textbook examples and tackle the challenges of real-world 
    applications. 
  overview:
    - label: "Who should apply?"
      bullets:
        - Open to participants from any discipline.
        - "Aimed at researchers willing to apply AI methods in their work, i.e. PhD
          students, postdocs, research faculty and staff, and Master's or
          undergraduate students who are already involved in research."
    - label: "Prerequisites:"
      bullets:
        - Programming experience in a scripting language such as Python or R.
        - Familiarity with one or more machine learning approaches, such as 
          logistic regression or random forests.
    - label: "Registration Fees:"
      bullets: 
        - "UW Student: $30"
        - "UW Postdoc: $50"
        - "UW Faculty/Staff: $100"
        - "Non-UW: $200"
        
  learn_more: https://escience.washington.edu/using-data-science/hackweeks
  links:
    - url: '#'
      title: A sample link
      new_window: True
projects:
  description: >-
    Participants will be invited to develop their own ideas for project work, 
    ideally building on an existing research project, exploring a new 
    direction, or working directly with concepts from Day 1 to solidify 
    learning. Throughout the week, participants will apply what they learn 
    to their projects, with instructors and assistants available for 
    guidance. We encourage participants working on similar problems to 
    collaborate and learn from each other. On the final 
    day, participants will share their progress and define a concrete plan 
    for continuing the work after the event. 
  learn_more: 'projects/index.html'
tutorials:
  description: >-
    The tutorials will provide a broad overview of modern AI methods 
    and tools for research, and will include hands-on examples in Python.
    On Day 1 participants will learn how neural networks
    are trained and evaluated, how vision and sequence models work, and how 
    transfer learning lets researchers build on pretrained models rather than 
    starting from scratch. Later tutorials will illustrate best practices for 
    applying these approaches across a full AI research lifecycle. Other topics 
    will include foundation models, and the practicalities of scaling 
    training and deployment. Dedicated sessions also address how to interpret 
    AI results rigorously and make AI-based research reproducible. 

  learn_more: 'tutorials/index.html'
applicant_info: Still have questions? Visit our the FAQ page for 
